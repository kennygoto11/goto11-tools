<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Pitch Builder | Go To 11</title>
    <meta name="description" content="Build, compare, and deploy your positioning statements">
</head>
<body>
    <!-- React App Container -->
    <div id="root">
        <!-- HEADER -->
        <header class="app-header">
            <img src="/logo.svg" alt="Go To 11" class="logo">
        </header>

        <!-- MAIN APPLICATION -->
        <main class="app-container">
            <!-- TITLE SECTION -->
            <section class="title-section">
                <h1>Positioning Pitch Builder</h1>
                <p class="tagline">Build, compare, and deploy your positioning statements</p>
            </section>

            <!-- NAVIGATION TABS -->
            <nav class="nav-tabs">
                <button class="tab-button active">✏️ Builder</button>
                <button class="tab-button">📋 My List</button>
                <button class="tab-button">🗑️ Trash</button>
            </nav>

            <!-- THREE-COLUMN LAYOUT -->
            <div class="main-layout">

                <!-- COLUMN 1: AUDIENCE SELECTION -->
                <section class="column column-1 audience-section">
                    <h2>Audience</h2>

                    <div class="step-indicator">
                        <h3>Step 1: Who are you about to speak to?</h3>
                        <p class="step-description">Pick the world they live in — this shapes everything else.</p>
                    </div>

                    <div class="audience-buttons">
                        <!-- Button 1: Tech / SaaS -->
                        <button class="audience-btn">
                            <h4>Tech / SaaS</h4>
                            <p>Selling platforms, integrations, or digital products</p>
                        </button>

                        <!-- Button 2: Investment / Finance -->
                        <button class="audience-btn">
                            <h4>Investment / Finance</h4>
                            <p>Raising capital, pitching funds, or selling financial products</p>
                        </button>

                        <!-- Button 3: CPG / Consumer Goods -->
                        <button class="audience-btn">
                            <h4>CPG / Consumer Goods</h4>
                            <p>Launching products, entering markets, or pitching retail</p>
                        </button>

                        <!-- Button 4: Professional Services -->
                        <button class="audience-btn">
                            <h4>Professional Services</h4>
                            <p>Consulting, agencies, or advisory firms pitching clients</p>
                        </button>

                        <!-- Button 5: Startup / Founder -->
                        <button class="audience-btn">
                            <h4>Startup / Founder</h4>
                            <p>Pitching investors, boards, or strategic partners</p>
                        </button>

                        <!-- Button 6: Internal Corporate -->
                        <button class="audience-btn">
                            <h4>Internal Corporate</h4>
                            <p>Pitching up — strategies, budgets, or initiatives to leadership</p>
                        </button>
                    </div>
                </section>

                <!-- COLUMN 2: POSITIONING BUILDER -->
                <section class="column column-2 builder-section">
                    <h2>Who + What</h2>
                    <!-- Dynamic content based on audience selection -->
                    <!-- Expected fields:
                        - Who are you / your offering?
                        - What problem do you solve?
                        - What makes you different?
                        - Positioning statement preview
                    -->
                </section>

                <!-- COLUMN 3: PITCH OUTPUTS -->
                <section class="column column-3 pitches-section">
                    <h2>Your Pitches</h2>
                    <!-- Display generated positioning statements -->
                    <!-- Features:
                        - Save/unsave options
                        - Compare mode
                        - Export/copy to clipboard
                        - Timestamp of creation
                    -->
                </section>

            </div>
        </main>
    </div>

    <!-- React and App Scripts Would Be Injected Here -->
    <script>
        // Application Bootstrap
        // This is where a React app would mount and initialize
        // State management would handle:
        // - Current audience selection
        // - Form input values
        // - Saved pitches (localStorage or API)
        // - Navigation state
    </script>
</body>
</html>
