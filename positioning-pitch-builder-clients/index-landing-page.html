<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Positioning Tool | Go To 11</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap">
    <style>
        /* Go To 11 Brand Colors */
        --goto11-purple: #A535CF;
        --goto11-light-gray: #F5F5F5;
        --goto11-dark-text: #333333;
        --goto11-light-text: #999999;
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="48" height="48" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="34" stroke="#9439bf" stroke-width="5"/><circle cx="58" cy="52" r="4" stroke="#9439bf" stroke-width="2.5"/><line x1="50" y1="6" x2="50" y2="16" stroke="#9439bf" stroke-width="4" stroke-linecap="round"/><line x1="50" y1="84" x2="50" y2="94" stroke="#9439bf" stroke-width="4" stroke-linecap="round"/><line x1="6" y1="50" x2="16" y2="50" stroke="#9439bf" stroke-width="4" stroke-linecap="round"/><line x1="84" y1="50" x2="94" y2="50" stroke="#9439bf" stroke-width="4" stroke-linecap="round"/><line x1="19" y1="19" x2="26" y2="26" stroke="#9439bf" stroke-width="4" stroke-linecap="round"/><line x1="74" y1="74" x2="81" y2="81" stroke="#9439bf" stroke-width="4" stroke-linecap="round"/><line x1="81" y1="19" x2="74" y2="26" stroke="#9439bf" stroke-width="4" stroke-linecap="round"/><line x1="26" y1="74" x2="19" y2="81" stroke="#9439bf" stroke-width="4" stroke-linecap="round"/></svg>
        </div>

        <div class="card">
            <h1>Client Positioning Tool</h1>
            <p class="subtitle">Access the interactive positioning and pitch builder designed for your engagement. Enter your details below.</p>

            <form id="accessForm">
                <input type="hidden" name="form-id" value="pitch-clients-access">
                <input type="hidden" name="form-name" value="Positioning Pitch Builder (Clients)">

                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="First and last name" required>
                </div>

                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" name="email" placeholder="you@company.com" required>
                </div>

                <div class="form-group">
                    <label for="company">Company</label>
                    <input type="text" id="company" name="company" placeholder="Your organisation" required>
                </div>

                <button type="submit" class="btn-primary">Access the Tool →</button>
            </form>

            <p class="disclaimer">Your information is kept confidential. We'll only use it to follow up with you about this tool.</p>
        </div>

        <footer>
            <p>Go To 11 Communication Training — <a href="https://goto11.ca">goto11.ca</a></p>
        </footer>
    </div>

    <!-- Demo redirect script -->
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            if (params.get('demo') === 'goto11') {
                window.location.href = 'https://69c857d3ba49763db7f0344b--positioning-pitch-builder-clients.netlify.app';
            }
        })();
    </script>
</body>
</html>
